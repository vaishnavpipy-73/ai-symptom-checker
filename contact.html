<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - MediPredict AI</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Sticky Header -->
  <div id="navbar-placeholder"></div>

  <!-- Main Body Content -->
  <main class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 8rem);">
    
    <div class="card" style="width: 100%; max-width: 22rem; overflow: hidden; padding: 0;">
      
      <!-- Card header -->
      <div style="background-color: var(--bg-secondary); padding: 1.25rem; border-bottom: 1px solid var(--card-border); text-align: center;">
        <h1 style="font-size: 1.15rem; font-weight: 800; color: var(--text-main); display: flex; items-center: center; justify-content: center; gap: 0.35rem;">
          <span>✉️</span> Contact Us
        </h1>
        <p style="font-size: 0.65rem; color: var(--text-muted); margin-top: 0.15rem;">
          Submit questions regarding Bayesian logic.
        </p>
      </div>

      <!-- Card body -->
      <div style="padding: 1.5rem;">
        
        <!-- Feedback messages -->
        <div id="success-banner" style="display: none; padding: 0.65rem; margin-bottom: 1rem; font-size: 0.65rem; color: var(--color-success); background-color: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.15); border-radius: 8px;">
          ✓ Thank you! Your message has been sent successfully.
        </div>
        <div id="error-banner" style="display: none; padding: 0.65rem; margin-bottom: 1rem; font-size: 0.65rem; color: var(--color-danger); background-color: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.15); border-radius: 8px;"></div>

        <form id="contact-form" onsubmit="handleContactSubmit(event)" style="display: flex; flex-direction: column; gap: 1rem;">
          
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="contact-name" placeholder="Dr. Alexander Fleming" class="form-input" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="contact-email" placeholder="alexander@healthcare.com" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Subject</label>
            <input type="text" id="contact-subject" placeholder="e.g., Laplace Smoothing parameters" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Message</label>
            <textarea id="contact-message" placeholder="Type your message here..." class="form-input" style="height: 4.5rem; resize: none;" required></textarea>
          </div>

          <button type="submit" id="submit-btn" class="btn btn-primary" style="font-size: 0.65rem; padding: 0.6rem 1rem;">
            Send Message
          </button>
        </form>

      </div>

    </div>

  </main>

  <!-- Sticky Footer -->
  <footer id="footer-placeholder"></footer>

  <!-- Script Imports -->
  <script src="js/dataset.js"></script>
  <script src="js/db.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>

  <!-- Page Logic Script -->
  <script>
    function handleContactSubmit(e) {
      e.preventDefault();
      
      const success = document.getElementById("success-banner");
      const error = document.getElementById("error-banner");
      const btn = document.getElementById("submit-btn");

      success.style.display = "none";
      error.style.display = "none";

      const name = document.getElementById("contact-name").value.trim();
      const email = document.getElementById("contact-email").value.trim();
      const subject = document.getElementById("contact-subject").value.trim();
      const message = document.getElementById("contact-message").value.trim();

      if (!name || !email || !subject || !message) {
        error.textContent = "Please fill in all input fields.";
        error.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Sending Message...";

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = "Send Message";
        success.style.display = "block";
        
        // Reset form
        document.getElementById("contact-form").reset();
      }, 800);
    }
  </script>
</body>
</html>
