<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Secure Gate - MediPredict AI</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/dataset.js"></script>
  <script src="js/db.js"></script>
  <script>
    // Guard: redirect if already admin
    (function() {
      db.init();
      const user = db.getCurrentUser();
      if (user && user.role === 'admin') {
        window.location.replace("admin.html");
      }
    })();
  </script>
</head>
<body>

  <!-- Sticky Header -->
  <div id="navbar-placeholder"></div>

  <!-- Main Body Content -->
  <main class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 8rem);">
    
    <div class="card" style="width: 100%; max-width: 22rem; overflow: hidden; padding: 0; text-align: center;">
      
      <!-- Banner header -->
      <div style="background-color: rgba(239, 68, 68, 0.05); padding: 1.25rem; border-bottom: 1px solid var(--card-border);">
        <div style="font-size: 1.5rem; margin-bottom: 0.25rem;">🔒</div>
        <h1 style="font-size: 1.15rem; font-weight: 800; color: var(--text-main);">Admin Secure Gate</h1>
        <p style="font-size: 0.65rem; color: var(--text-muted); margin-top: 0.15rem;">
          Access restricted. Admin credentials required.
        </p>
      </div>

      <!-- Form Body -->
      <div style="padding: 1.5rem;">
        
        <!-- Error Banner -->
        <div id="admin-error-banner" style="display: none; padding: 0.65rem; margin-bottom: 1rem; font-size: 0.65rem; color: var(--color-danger); background-color: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.15); border-radius: 8px;"></div>

        <form id="admin-form" onsubmit="handleAdminLoginSubmit(event)" style="display: flex; flex-direction: column; gap: 1rem; text-align: left;">
          
          <div class="form-group">
            <label class="form-label">Admin Email</label>
            <input type="email" id="admin-email" placeholder="admin@healthcare.com" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Secret Passkey</label>
            <input type="password" id="admin-password" placeholder="••••••••" class="form-input" required>
          </div>

          <button type="submit" id="admin-submit-btn" class="btn btn-primary" style="font-size: 0.65rem; padding: 0.65rem 1rem; margin-top: 0.5rem; justify-content: center; background: linear-gradient(135deg, #ef4444 0%, #d97706 100%); border-color: transparent;">
            Authorize Portal
          </button>
        </form>

        <!-- Bypass -->
        <div style="margin-top: 1.5rem; border-top: 1px solid var(--card-border); padding-top: 1rem;">
          <button onclick="handleQuickAdminLogin()" class="btn btn-secondary" style="width: 100%; font-size: 0.65rem;">
            ⚡ Quick Admin Login
          </button>
        </div>

      </div>

    </div>

  </main>

  <!-- Sticky Footer -->
  <footer id="footer-placeholder"></footer>

  <!-- Script Imports -->
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>

  <!-- Page Logic Script -->
  <script>
    function handleAdminLoginSubmit(e) {
      e.preventDefault();
      
      const error = document.getElementById("admin-error-banner");
      error.style.display = "none";

      const email = document.getElementById("admin-email").value.trim();
      const btn = document.getElementById("admin-submit-btn");

      btn.disabled = true;
      btn.textContent = "Verifying Credentials...";

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = "Authorize Portal";

        if (email.toLowerCase() !== "admin@healthcare.com") {
          error.textContent = "Access Denied. Account is not a registered administrator.";
          error.style.display = "block";
          return;
        }

        const result = db.login(email);
        if (typeof result === "string") {
          error.textContent = result;
          error.style.display = "block";
        } else {
          window.location.href = "admin.html";
        }
      }, 600);
    }

    function handleQuickAdminLogin() {
      const error = document.getElementById("admin-error-banner");
      error.style.display = "none";

      const result = db.login("admin@healthcare.com");
      if (typeof result === "string") {
        error.textContent = result;
        error.style.display = "block";
      } else {
        window.location.href = "admin.html";
      }
    }
  </script>
</body>
</html>
